<!DOCTYPE html>
<head>
    <title>Precise Age Calculator</title>
</head>
<body>
    <form id="ageForm">
        <label for="birthDate">Select your Date of Birth: </label>
        <input type="date" id="birthDate" required>
        <button type="button" onclick="calculateExactAge()">Calculate Age</button>
    </form>
    <p id="ageResult"></p>
    <script>
        function calculateExactAge() {
            let birthDateInput = document.getElementById("birthDate").value;
            let result = document.getElementById("ageResult");
            if (birthDateInput === "") {
                result.textContent = "Please select a valid date.";
                return;
            }
            let birthDate = new Date(birthDateInput);
            let currentDate = new Date();
            if (birthDate > currentDate) {
                result.textContent = "Birth date cannot be in the future!";
                return;
            }
            let age = currentDate.getFullYear() - birthDate.getFullYear();
            let monthDiff = currentDate.getMonth() - birthDate.getMonth();
            let dayDiff = currentDate.getDate() - birthDate.getDate();
            if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
                age--;
            }
            result.innerHTML = 'You are exactly '+age+' years old.';
        }
    </script>
</body>
</html>
