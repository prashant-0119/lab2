<!DOCTYPE html>
<body>
    <script>
        let num1 = parseFloat(prompt("Enter first number:"));
        let num2 = parseFloat(prompt("Enter second number:"));
        if (!isNaN(num1) && !isNaN(num2)) {
            let add = num1 + num2;
            let sub = num1 - num2;
            let mul = num1 * num2;
            let div = num2 !== 0 ? (num1 / num2) : "Cannot divide by zero";
            document.write(`<h3>Results:</h3>`);
            document.write(`Addition: ${add}<br>`);
            document.write(`Subtraction: ${sub}<br>`);
            document.write(`Multiplication: ${mul}<br>`);
            document.write(`Division: ${div}<br>`);
        } else {
            document.write("Invalid inputs provided.");
        }
    </script>
</body>
</html>
