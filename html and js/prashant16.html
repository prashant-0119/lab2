<!DOCTYPE html>
<head>
    <style>
        .error { color: red; font-size: 12px; display: block; }
        form { width: 320px; }
        input, select { width: 100%; margin: 5px 0; padding: 4px;}
        input[type="radio"] { width: auto; margin-right: 5px;}
    </style>
</head>
<body>
    <form id="regForm" onsubmit="return validateForm()">
        Name: <input type="text" id="name"><span id="e_name" class="error"></span>
        Address: <input type="text" id="address"><span id="e_address" class="error"></span>
        Username: <input type="text" id="username"><span id="e_username" class="error"></span>
        Email: <input type="text" id="email"><span id="e_email" class="error"></span>
        Password: <input type="password" id="password"><span id="e_password" class="error"></span>
        Website: <input type="text" id="website">
        Phone: <input type="text" id="phone"><span id="e_phone" class="error"></span>
        Gender: <br>
        <input type="radio" name="gender" value="Male" id="m">Male
        <input type="radio" name="gender" value="Female" id="f">Female
        <span id="e_gender" class="error"></span><br>
        Course: 
        <select id="course">
            <option value="">--Select--</option>
            <option value="BIM">BIM</option>
            <option value="BCA">BCA</option>
        </select>
        <span id="e_course" class="error"></span>
        <input type="submit" value="Submit">
    </form>
    <script>
        function validateForm() {
            let isValid = true;
            document.querySelectorAll('.error').forEach(e => e.textContent = "");
            let name = document.getElementById("name").value.trim();
            if(name === "" || /\d/.test(name)) {
                document.getElementById("e_name").textContent = "Required. Cannot contain numbers.";
                isValid = false;
            }
            if(document.getElementById("address").value.trim() === "") {
                document.getElementById("e_address").textContent = "Address cannot be empty.";
                isValid = false;
            }
            let uname = document.getElementById("username").value.trim();
            if(uname === "" || /[^a-zA-Z0-BA_]/.test(uname)) { // custom underscore validation constraint rules
                if(uname.includes(" ")) {
                     document.getElementById("e_username").textContent = "Spaces not allowed.";
                     isValid = false;
                }
            }
            let email = document.getElementById("email").value;
            if(!email.includes("@") || email.trim() === "") {
                document.getElementById("e_email").textContent = "Valid Email with '@' required.";
                isValid = false;
            }
            let pass = document.getElementById("password").value;
            let passRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if(!passRegex.test(pass)) {
                document.getElementById("e_password").textContent = "Must be 8+ chars, 1 Upper, 1 Lower, 1 Digit, 1 Special.";
                isValid = false;
            }
            let phone = document.getElementById("phone").value.trim();
            if(!/^(98|97|96)\d{8}$/.test(phone)) {
                document.getElementById("e_phone").textContent = "Must contain only numbers, 10 digits long starting with 98/97/96.";
                isValid = false;
            }
            if(!document.getElementById("m").checked && !document.getElementById("f").checked) {
                document.getElementById("e_gender").textContent = "Please select your gender.";
                isValid = false;
            }
            if(document.getElementById("course").value === "") {
                document.getElementById("e_course").textContent = "Please choose a course.";
                isValid = false;
            }
            return isValid;
        }
    </script>
</body>
</html>
