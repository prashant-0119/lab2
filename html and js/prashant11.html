<!DOCTYPE html>
<head>
    <style>
        .calc-body { width: 240px; background-color: #fff; border: 2px solid green; font-family: Arial; }
        #screen { width: 170px; height: 40px; font-size: 20px; text-align: right; border: 1px solid #ccc; margin: 5px; float: left;}
        .clear-btn { width: 50px; height: 44px; background: green; color: white; border: 1px solid #fff; font-size: 18px; margin-top: 5px; cursor: pointer;}
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); clear: both; }
        .grid button { height: 45px; background: green; color: white; border: 1px solid white; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="calc-body">
        <input type="text" id="screen" readonly>
        <button class="clear-btn" onclick="clearScreen()">c</button>
        <div class="grid">
            <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button><button onclick="press('/')">/</button>
            <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button><button onclick="press('*')">*</button>
            <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button><button onclick="press('-')">-</button>
            <button onclick="press('0')">0</button><button onclick="press('.')">.</button><button onclick="solve()">=</button><button onclick="press('+')">+</button>
        </div>
    </div>
    <script>
        let screen = document.getElementById("screen");
        function press(val) { screen.value += val; }
        function clearScreen() { screen.value = ""; }
        function solve() {
            try { screen.value = eval(screen.value); } 
            catch(err) { screen.value = "Error"; }
        }
    </script>
</body>
</html>
