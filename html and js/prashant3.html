<!DOCTYPE html>
<body>
    <script>
        let n1 = parseInt(prompt("Enter first integer:"));
        let n2 = parseInt(prompt("Enter second integer:"));
        if(n1 === n2) {
            document.write("Both integers are equal.");
        } else {
            let larger = n1 > n2 ? n1 : n2;
            let smaller = n1 < n2 ? n1 : n2;
            document.write(`Larger: ${larger}<br>Smaller: ${smaller}`);
        }
    </script>
</body>
</html>
