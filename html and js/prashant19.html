<!DOCTYPE html>
<body>
    <div id="screenMetrics"></div>
<script>
    let metrics = "<h3>Monitor Sizing Diagnostics</h3>" +
                  "<p>Total Screen Width: " + screen.width + "px</p>" +
                  "<p>Total Screen Height: " + screen.height + "px</p>" +
                  "<p>Available Screen Width: " + screen.availWidth + "px</p>";         
    document.getElementById("screenMetrics").innerHTML = metrics;
</script>
</body>
</html>
